<svg width="1180" height="760" viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1180" height="760" fill="#f7f8fa"/>

  <!-- Title -->
  <text x="40" y="40" font-size="20" font-weight="700" fill="#10151c">BlockSupply — Decentralized Supply Cloud: AWS Architecture</text>
  <text x="40" y="62" font-size="12.5" fill="#4b5563">EC2 + RDS (MariaDB) + S3 + CloudWatch + IAM, deployed inside a custom VPC</text>

  <!-- Users -->
  <rect x="40" y="100" width="160" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="120" y="124" font-size="13" font-weight="600" fill="#10151c" text-anchor="middle">Admin / Manager /</text>
  <text x="120" y="141" font-size="13" font-weight="600" fill="#10151c" text-anchor="middle">Staff (Browser)</text>

  <!-- Internet Gateway -->
  <rect x="280" y="100" width="150" height="56" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="355" y="124" font-size="12.5" font-weight="600" fill="#9a3412" text-anchor="middle">Internet</text>
  <text x="355" y="141" font-size="12.5" font-weight="600" fill="#9a3412" text-anchor="middle">Gateway</text>

  <line x1="200" y1="128" x2="278" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AWS Cloud boundary -->
  <rect x="40" y="190" width="1100" height="540" rx="14" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="58" y="214" font-size="13" font-weight="700" fill="#b45309">AWS Cloud — ap-south-1</text>

  <!-- IAM banner -->
  <rect x="900" y="200" width="220" height="44" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="1010" y="220" font-size="11.5" font-weight="700" fill="#9d174d" text-anchor="middle">IAM Role</text>
  <text x="1010" y="234" font-size="10.5" fill="#9d174d" text-anchor="middle">EC2 → S3 + CloudWatch access</text>

  <!-- VPC boundary -->
  <rect x="70" y="250" width="700" height="450" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="86" y="274" font-size="12.5" font-weight="700" fill="#1d4ed8">VPC (10.0.0.0/16)</text>

  <!-- Public subnet -->
  <rect x="100" y="296" width="300" height="180" rx="10" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="116" y="318" font-size="11.5" font-weight="700" fill="#1d4ed8">Public Subnet (10.0.1.0/24)</text>

  <rect x="120" y="334" width="260" height="56" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="250" y="356" font-size="12.5" font-weight="700" fill="#9a3412" text-anchor="middle">EC2 — Flask App</text>
  <text x="250" y="372" font-size="10.5" fill="#9a3412" text-anchor="middle">gunicorn :5000 (behind SG)</text>

  <rect x="120" y="400" width="260" height="56" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="250" y="422" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">Security Group: web-sg</text>
  <text x="250" y="438" font-size="10" fill="#334155" text-anchor="middle">Inbound: 22 (you), 80/443 (0.0.0.0/0)</text>

  <!-- Private subnet -->
  <rect x="430" y="296" width="300" height="180" rx="10" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="446" y="318" font-size="11.5" font-weight="700" fill="#1d4ed8">Private Subnet (10.0.2.0/24)</text>

  <rect x="450" y="334" width="260" height="56" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="580" y="356" font-size="12.5" font-weight="700" fill="#3730a3" text-anchor="middle">RDS — MariaDB</text>
  <text x="580" y="372" font-size="10.5" fill="#3730a3" text-anchor="middle">users · inventory · shipments</text>

  <rect x="450" y="400" width="260" height="56" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="580" y="422" font-size="11.5" font-weight="700" fill="#334155" text-anchor="middle">Security Group: db-sg</text>
  <text x="580" y="438" font-size="10" fill="#334155" text-anchor="middle">Inbound: 3306 from web-sg only</text>

  <!-- EC2 -> RDS arrow -->
  <line x1="380" y1="362" x2="450" y2="362" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Internet GW -> EC2 -->
  <line x1="355" y1="156" x2="250" y2="334" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NAT note -->
  <rect x="100" y="500" width="300" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="250" y="520" font-size="10.5" fill="#475569" text-anchor="middle">NAT Gateway (optional)</text>
  <text x="250" y="535" font-size="9.5" fill="#64748b" text-anchor="middle">outbound updates for private subnet</text>

  <!-- CloudWatch (inside VPC box, monitoring both) -->
  <rect x="100" y="580" width="630" height="56" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="415" y="602" font-size="12.5" font-weight="700" fill="#0e7490" text-anchor="middle">CloudWatch</text>
  <text x="415" y="618" font-size="10.5" fill="#0e7490" text-anchor="middle">CPU / Network metrics (EC2, RDS) · Application logs · Custom metrics</text>

  <line x1="250" y1="456" x2="250" y2="580" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="580" y1="456" x2="580" y2="580" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- S3 outside VPC -->
  <rect x="820" y="334" width="260" height="80" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="950" y="362" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">S3 Bucket</text>
  <text x="950" y="380" font-size="10.5" fill="#065f46" text-anchor="middle">reports/  ·  documents/</text>
  <text x="950" y="396" font-size="9.5" fill="#065f46" text-anchor="middle">accessed via IAM role (no static keys)</text>

  <!-- EC2 -> S3 arrow (via IAM) -->
  <path d="M 380 350 C 600 250, 750 250, 818 350" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="262" font-size="10" fill="#065f46" text-anchor="middle">boto3 (IAM role, no hardcoded keys)</text>

  <!-- Legend -->
  <text x="86" y="700" font-size="11" fill="#64748b">Solid arrows = data path</text>
  <text x="86" y="716" font-size="11" fill="#64748b">Dashed arrows = monitoring path</text>
  <text x="450" y="700" font-size="11" fill="#64748b">All compute/data access scoped via IAM roles, not static credentials</text>
</svg>
